<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden State Warriors Stats</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">WARRIORS</a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="roster.html">Roster</a>
      <a href="legends.html">Legends</a>
      <a href="compare.html">Compare</a>
    </div>
  </nav>

  <section class="hero">
    <p class="hero-subtitle">Golden State</p>
    <h1 class="hero-title">Warriors</h1>
    <hr class="hero-divider" />
    <p class="hero-subtitle">EST. 1946 · 7x NBA CHAMPIONS</p>
  </section>

  <section style="max-width:900px;margin:0 auto;padding:60px 40px;">
    <h3 style="font-size:11px;letter-spacing:4px;color:var(--text-muted);text-transform:uppercase;margin-bottom:32px;">Featured Player</h3>
    <h2 id="featured-name" style="font-size:36px;font-weight:300;letter-spacing:2px;margin:0 0 8px;"></h2>
    <p id="featured-meta" style="font-size:12px;color:var(--text-muted);letter-spacing:1px;margin:0 0 32px;"></p>
    <div id="featured-stats" class="stat-grid"></div>
  </section>

  <section style="max-width:900px;margin:0 auto;padding:0 40px 80px;">
    <h3 style="font-size:11px;letter-spacing:4px;color:var(--text-muted);text-transform:uppercase;margin-bottom:32px;">Franchise History</h3>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-value">7</div>
        <div class="stat-label">Championships</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">1946</div>
        <div class="stat-label">Founded</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">12</div>
        <div class="stat-label">Retired Numbers</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">53</div>
        <div class="stat-label">Hall of Famers</div>
      </div>
    </div>
  </section>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
